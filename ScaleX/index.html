<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScaleX</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="main">
      <div class="nav">
        <div class="logo">
          <img src="logo.png" alt="" />
        </div>
        <div class="pages">
          <p>Home</p>
          <p>About Us</p>
          <p>Blogs</p>
          <p>Contact Us</p>
        </div>
        <div class="start">
          <button>Get Started</button>
        </div>
      </div>
      <div class="mid-part-h1">
        <h1>Insights &amp; Blogs</h1>
      </div>
      <div class="card-nav">
        <button autofocus>All</button>
        <button>Tech</button>
        <button>saaS</button>
        <button>Marketing</button>
      </div>
      <div class="card-section">
        <div class="card">
          <div class="image">
            <img src="card-1.png">
          </div>
          <div class="content">
            <button>Tech</button>
            <h4>The Ultimate Guide To <br>SaaS Marketing</h4>
            <p>May 23, 2025</p>
          </div>
        </div>
        <div class="card">
          <div class="image">
            <img src="card-2.png">
          </div>
          <div class="content">
            <button>SaaS</button>
            <h4>5 Key Trends In SaaS<br>Growth For 2025</h4>
            <p>May 23, 2025</p>
          </div>
        </div>
        <div class="card">
          <div class="image">
            <img src="card-3.png">
          </div>
          <div class="content">
            <button>Marketing</button>
            <h4>How Data-Driven<br>Strategies Are Important</h4>
            <p>May 23, 2025</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
